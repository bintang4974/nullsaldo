version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nullsaldo-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-nullsaldo}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-nullsaldo}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/mysql.cnf
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - nullsaldo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nullsaldo-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USERNAME:-nullsaldo}
      PMA_PASSWORD: ${DB_PASSWORD:-password}
      PMA_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      UPLOAD_LIMIT: 1073741824
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      - mysql
    networks:
      - nullsaldo-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nullsaldo-app
    environment:
      APP_NAME: ${APP_NAME:-NullSaldo}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-nullsaldo}
      DB_USERNAME: ${DB_USERNAME:-nullsaldo}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
    volumes:
      - .:/app
      - vendor:/app/vendor
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nullsaldo-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  vendor:
    driver: local

networks:
  nullsaldo-network:
    driver: bridge
